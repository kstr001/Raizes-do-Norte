<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raízes do Nordeste - Pedido</title>
  <style>
    
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f5f5f5; }
    .container { max-width:600px; margin:auto; padding:20px; }
    .card { background:#fff; padding:15px; margin-bottom:15px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,.1); }
    h1, h3 { text-align:center; }
    button { width:100%; padding:10px; margin-top:10px; border:none; border-radius:5px; background:#ff6600; color:#fff; font-size:16px; }
    button:hover { background:#e65c00; }
    select, input { width:100%; padding:10px; margin-top:5px; border-radius:5px; border:1px solid #ccc; }

    button:disabled {background: #ccc;color: #666;cursor: not-allowed;}

    .mensagem {font-size: 18px;font-weight: bold;margin-top: 10px;}

    .aprovado {color: green;}

    .negado {color: red;}

    .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(120px,1fr)); gap:10px; }
    .produto { background:#fff; border-radius:10px; padding:10px; text-align:center; cursor:pointer; border:2px solid transparent; }
    .produto.selected { border:2px solid #ff6600; }
    .produto img { width:100%; border-radius:8px; }

    .hidden { display:none; }

    /* Modal */
    #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.5); }
    #modalContent { background:#fff; padding:20px; border-radius:10px; max-width:300px; margin:100px auto; text-align:center; }
  </style>
</head>
<body>
<div class="container">

  <!-- TELA 1: LOGIN + UNIDADE -->
  <div id="tela1" class="card">
    <h3>Login</h3>
    <input type="text" id="usuario" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">
    <br>
    <br>
    <label>Unidade:</label>
    <select id="unidade">
      <option value="">Selecione</option>
      <option>Curitiba</option>
      <option>São Paulo</option>
    </select>

    <button onclick="login()">Entrar</button>
  </div>

  <!-- TELA 2: PRODUTOS -->
  <div id="tela2" class="hidden">
    <h1>Cardápio</h1>
    <div class="card">
      <div class="grid">
        <div class="produto" onclick="selecionarProduto(event,'Cuscuz',10,10,7)">
          <img src="https://totalpass.com/wp-content/uploads/2025/01/cuscuz-de-milho.jpg">
          <p>Cuscuz - R$10</p>
        </div>
        <div class="produto" onclick="selecionarProduto(event,'Tapioca',12,12,5)">
          <img src="https://www.sabornamesa.com.br/media/k2/items/cache/9217346f41a5b7e8e45bd1d2bf97a850_XL.jpg">
          <p>Tapioca - R$12</p>
        </div>
        <div class="produto" onclick="selecionarProduto(event,'Acarajé',8,8,7)">
          <img src="https://www.osazeitesdaespanha.com/wp-content/uploads/2023/09/acaraje.jpeg.webp">
          <p>Acarajé - R$8</p>
        </div>
        <div class="produto" onclick="selecionarProduto(event,'Baião de Dois',30,30,20)">
          <img src="https://www.receitasnestle.com.br/sites/default/files/styles/recipe_detail_desktop_new/public/srh_recipes/3a7894a73fdec85a8f18e57156625212.webp?itok=iqMqg8QA">
          <p>Baião de Dois - R$30</p>
        </div>
      </div>
      <button onclick="adicionarCarrinho()">Adicionar ao Carrinho</button>
    </div>
  </div>

  <!-- TELA 3: CARRINHO -->
  <div id="tela3" class="hidden">
    <h1>Carrinho</h1>
    <div class="card">
      <div id="listaCarrinho"></div>
      <p><strong>Total: R$ <span id="total">0</span></strong></p>
      <button onclick="irParaEndereco()">Ir para definir o endereço</button>
      <button onclick="irParaTela('tela2')">Voltar</button>
    </div>
  </div>

  <!-- TELA 4: ENDEREÇO -->
<div id="telaEndereco" class="hidden">
  <h1>Endereço</h1>
  <div class="card">
    <input type="text" id="cep" placeholder="CEP">
    <input type="text" id="numero" placeholder="Número">

    <button onclick="irParaPagamentoComEndereco()">Continuar</button>
    <button onclick="irParaTela('tela3')">Voltar</button>
  </div>
</div>

  <!-- TELA 5: PAGAMENTO -->
  <div id="tela4" class="hidden">
    <h1>Pagamento</h1>
    <div class="card">
      <p><strong>Total: R$ <span id="totalPagamento">0</span></strong></p>
      <button onclick="solicitarPagamento()">Pagar</button>
      <p id="resultado"></p>
      <button onclick="irParaTela('tela3')">Voltar</button>
    </div>
  </div>

</div>

<!-- TELA 6: PREPARO -->
<div id="tela5" class="hidden">
  <h1>Pedido em Preparação</h1>
  <div class="card">
    <p>Seu pedido está sendo preparado...</p>
    <p><strong>Tempo estimado: <span id="tempoPreparo"></span> min</strong></p>
  </div>
</div>

<!-- MODAL -->
<div id="modal">
  <div id="modalContent">
    <p id="modalMsg"></p>
    <button onclick="fecharModal()">OK</button>
  </div>
</div>

<div id="loading" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); color:white; justify-content:center; align-items:center; flex-direction:column; z-index:999;">
  <p>⏳ Carregando...</p>
</div>

<script>

function irParaTela(id) {
  mostrarLoading();

  setTimeout(() => {
    document.querySelectorAll('[id^="tela"]').forEach(t => t.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');

    esconderLoading();
  }, 800);
}

function mostrarModal(msg) {
  document.getElementById('modalMsg').innerText = msg;
  document.getElementById('modal').style.display = 'block';
}

function fecharModal() {
  document.getElementById('modal').style.display = 'none';
}

function login() {
  const user = document.getElementById('usuario').value;
  const pass = document.getElementById('senha').value;
  const unidade = document.getElementById('unidade').value;

  if (!user || !pass || !unidade) {
    mostrarModal('Preencha todos os campos');
    return;
  }

  if (user === 'admin' && pass === '123') {
    irParaTela('tela2');
  } else {
    mostrarModal('Login inválido');
  }
}

let carrinho = [];
let produtoSelecionado = null;
let total = 0;


function adicionarCarrinho() {
  if (!produtoSelecionado) {
    mostrarModal('Selecione um produto');
    return;
  }

  carrinho.push(produtoSelecionado);
  total += produtoSelecionado.preco;

  renderCarrinho();

  irParaTela('tela3');
}

function renderCarrinho() {
  const lista = document.getElementById('listaCarrinho');
  lista.innerHTML = '';

  carrinho.forEach((item, index) => {
    const div = document.createElement('div');
    div.innerHTML = `${item.nome} - R$${item.preco} <button onclick="removerItem(${index})">Remover</button>`;
    lista.appendChild(div);
  });

  document.getElementById('total').innerText = total;
}

function removerItem(index) {
  total -= carrinho[index].preco;
  carrinho.splice(index, 1);
  renderCarrinho();
}

function irParaPagamento() {
  if (carrinho.length === 0) {
    mostrarModal('Carrinho vazio');
    return;
  }

  document.getElementById('totalPagamento').innerText = total;
  irParaTela('tela4');
}

function solicitarPagamento() {
  const resultado = document.getElementById('resultado');
  const botao = event.currentTarget;

  botao.disabled = true;

  resultado.className = 'mensagem';
  resultado.innerText = 'Processando pagamento...';

  setTimeout(() => {
    const sucesso = Math.random() < 0.5;

    if (sucesso) {
    resultado.className = 'mensagem aprovado';
    resultado.innerText = 'Pagamento aprovado!';

    const tempoProduto = carrinho.reduce((acc, item) => acc + item.tempo, 0);
    const tempoEntrega = getTempoEntrega();
    const tempoTotal = tempoProduto + tempoEntrega;
    
    let segundosRestantes = tempoTotal * 60; 

    const atualizarDisplay = () => {
        const minutos = Math.floor(segundosRestantes / 60);
        const segundos = segundosRestantes % 60;
        
        // Formata para aparecer sempre 00:00
        const formatado = `${minutos}:${segundos.toString().padStart(2, '0')}`;
        document.getElementById('tempoPreparo').innerText = formatado;
    };

    const contadorId = setInterval(() => {
        segundosRestantes--;
        atualizarDisplay();

        if (segundosRestantes <= 0) {
            clearInterval(contadorId);
            document.getElementById('tempoPreparo').innerText = "Pedido Pronto!";
        }
    }, 1000);

    atualizarDisplay();

    setTimeout(() => {
        irParaTela('tela5');
    }, 1500);

    } else {
      resultado.className = 'mensagem negado';
      resultado.innerText = 'Pagamento negado!';
      botao.disabled = false;
    }
  }, 3000);
}

function selecionarProduto(event, nome, preco, tempo) {
  produtoSelecionado = { nome, preco, tempo };

  document.querySelectorAll('.produto').forEach(p => p.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
}

function getTempoEntrega() {
  const unidade = document.getElementById('unidade').value;

  if (unidade === 'Curitiba') return 15;
  if (unidade === 'São Paulo') return 18;

  return 0;
}

function irParaEndereco() {
  if (carrinho.length === 0) {
    mostrarModal('Carrinho vazio');
    return;
  }

  irParaTela('telaEndereco');
}

function irParaPagamentoComEndereco() {
  const cep = document.getElementById('cep').value;
  const numero = document.getElementById('numero').value;

  if (!cep || !numero) {
    mostrarModal('Preencha o endereço');
    return;
  }

  document.getElementById('totalPagamento').innerText = total;
  irParaTela('tela4');
}

function mostrarLoading() {
  document.getElementById('loading').style.display = 'flex';
}

function esconderLoading() {
  document.getElementById('loading').style.display = 'none';
}

</script>

</body>
</html>
